# One-click backend deploy on Render (https://render.com).
# Dashboard → New → Blueprint → connect this repo. Set MONGODB_URI when prompted.
services:
  - type: web
    name: zoopfi-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: MONGODB_URI
        sync: false # set in the Render dashboard (MongoDB Atlas connection string)
      - key: CORS_ORIGINS
        sync: false # optional: your Vercel URL, comma-separated
