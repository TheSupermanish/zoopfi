<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  <!-- Dollar sign / Payment symbol -->
  <g transform="translate(256, 256)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="white" stroke-width="16" opacity="0.3"/>
    <!-- Inner S shape for SuperPay -->
    <path d="M-50,-80 Q-80,-80 -80,-50 Q-80,-20 -40,-10 L40,10 Q80,20 80,50 Q80,80 50,80" 
          fill="none" stroke="white" stroke-width="24" stroke-linecap="round"/>
    <!-- Top and bottom lines -->
    <line x1="0" y1="-110" x2="0" y2="-70" stroke="white" stroke-width="20" stroke-linecap="round"/>
    <line x1="0" y1="70" x2="0" y2="110" stroke="white" stroke-width="20" stroke-linecap="round"/>
  </g>
  <!-- Sparkle accents -->
  <circle cx="400" cy="100" r="12" fill="white" opacity="0.6"/>
  <circle cx="420" cy="140" r="6" fill="white" opacity="0.4"/>
</svg>

